apiVersion: v1
kind: Pod
metadata:
  name: pod-x-noisy
  labels:
    app: noisy-neighbor
    xander.io/scenario: log-heavy-noisy-neighbor
    xander.io/role: source
spec:
  containers:
  - name: noisy
    image: busybox
    command: ["/bin/sh", "-c"]
    args:
    - |
      set -eu
      touch /tmp/noisy-ready
      echo "Starting noisy disk I/O generation (forced writeback)..."
      while true; do
        # Write a bounded file and sync it so cgroup io.stat sees real disk writeback.
        dd if=/dev/zero of=/work/noisy-write.bin bs=1M count=128 2>/dev/null
        sync
        rm -f /work/noisy-write.bin
        sync
        sleep 1
      done
    readinessProbe:
      exec:
        command: ["test", "-f", "/tmp/noisy-ready"]
      periodSeconds: 5
      timeoutSeconds: 2
    volumeMounts:
    - name: noisy-work
      mountPath: /work
  volumes:
  - name: noisy-work
    emptyDir:
      sizeLimit: 512Mi
