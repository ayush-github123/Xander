apiVersion: v1
kind: Pod
metadata:
  name: pod-y-web
spec:
  containers:
  - name: nginx
    image: nginx:alpine
    command: ["/bin/sh", "-c"]
    args:
    - |
      echo "Generating static content for web server..."
      # Create some 10MB dummy files
      for i in $(seq 1 10); do
        dd if=/dev/urandom of=/usr/share/nginx/html/file_$i.bin bs=1M count=10
      done
      echo "Starting nginx..."
      nginx -g 'daemon off;'
