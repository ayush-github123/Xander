apiVersion: v1
kind: Pod
metadata:
  name: pod-x-cache-clearer
  labels:
    app: cache-clearer
    xander.io/scenario: page-cache-contention
    xander.io/role: source
spec:
  containers:
  - name: cache-clearer
    image: alpine:latest
    command: ["/bin/sh", "-c"]
    args:
    - |
      set -eu
      echo "Generating bounded file to churn page cache..."
      dd if=/dev/zero of=/tmp/massive_file bs=1M count=256
      touch /tmp/cache-ready
      while true; do
        echo "Reading massive file to evict other caches..."
        cat /tmp/massive_file > /dev/null
        sleep 1
      done
    readinessProbe:
      exec:
        command: ["test", "-f", "/tmp/cache-ready"]
      periodSeconds: 5
      timeoutSeconds: 2
