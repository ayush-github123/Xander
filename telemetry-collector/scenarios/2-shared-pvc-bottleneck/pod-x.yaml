apiVersion: v1
kind: Pod
metadata:
  name: pod-x-writer
  labels:
    app: pvc-writer
    xander.io/scenario: shared-pvc-bottleneck
    xander.io/role: source
spec:
  containers:
  - name: fio-writer
    image: alpine:latest
    command: ["/bin/sh", "-c"]
    args:
    - |
      set -eu
      apk add --no-cache fio
      touch /tmp/writer-ready
      echo "Starting heavy sequential writes..."
      fio --name=writer --directory=/data --rw=write --bs=1M --size=2G --numjobs=1 --time_based --runtime=3600 --group_reporting
    readinessProbe:
      exec:
        command: ["test", "-f", "/tmp/writer-ready"]
      periodSeconds: 5
      timeoutSeconds: 2
    volumeMounts:
    - name: shared-data
      mountPath: /data
  volumes:
  - name: shared-data
    hostPath:
      path: /tmp/shared-io-test
      type: DirectoryOrCreate
