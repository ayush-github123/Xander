apiVersion: v1
kind: Pod
metadata:
  name: pod-y-reader
  labels:
    app: pvc-reader
    xander.io/scenario: shared-pvc-bottleneck
    xander.io/role: victim
spec:
  containers:
  - name: fio-reader
    image: alpine:latest
    command: ["/bin/sh", "-c"]
    args:
    - |
      set -eu
      apk add --no-cache fio
      echo "Preparing test file for reads..."
      fio --name=prep --directory=/data --rw=write --bs=1M --size=1G --numjobs=1
      touch /tmp/reader-ready
      echo "Starting random reads. Watch the latency!"
      fio --name=reader --directory=/data --rw=randread --bs=4k --size=1G --numjobs=1 --time_based --runtime=3600 --group_reporting
    readinessProbe:
      exec:
        command: ["test", "-f", "/tmp/reader-ready"]
      periodSeconds: 5
      timeoutSeconds: 2
    volumeMounts:
    - name: shared-data
      mountPath: /data
  volumes:
  - name: shared-data
    hostPath:
      path: /tmp/shared-io-test
      type: DirectoryOrCreate
